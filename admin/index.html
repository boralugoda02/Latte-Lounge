<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latte Lounge Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      body {
        background-color: #F8F9FA !important;
      }
      #nc-root header, 
      nav[class*="AppHeader"] {
        background-color: #111111 !important;
        border-bottom: 2px solid #FF8DA1 !important;
        height: 65px !important;
      }
      nav[class*="AppHeader"]::before {
        content: " LATTE LOUNGE BY 7's";
        color: #FF8DA1 !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: 1px;
        padding-left: 20px;
        display: flex;
        align-items: center;
        height: 100%;
      }
      nav[class*="AppHeader"] a, 
      nav[class*="AppHeader"] div[class*="Logo"] {
        display: none !important;
      }
      aside[class*="Sidebar"], 
      div[class*="SidebarContainer"] {
        background-color: #1A1A1A !important;
      }
      aside[class*="Sidebar"] h2 {
        color: #FF8DA1 !important;
        font-weight: 600 !important;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        padding-left: 15px !important;
      }
      aside[class*="Sidebar"] a {
        color: #B3B3B3 !important;
        border-radius: 6px !important;
        margin: 4px 12px !important;
        padding: 10px 15px !important;
        transition: all 0.2s ease !important;
        font-size: 0.9rem !important;
      }
      aside[class*="Sidebar"] a:hover {
        background-color: #2D2D2D !important;
        color: #FF8DA1 !important;
      }
      aside[class*="Sidebar"] a[class*="active"],
      aside[class*="Sidebar"] a:active {
        background-color: #FF8DA1 !important;
        color: #111111 !important;
        font-weight: 600 !important;
      }
      button[class*="Button"], 
      a[class*="Button"],
      div[class*="QuickAdd"] button,
      button[class*="StyledDropdownButton"] {
        background-color: #111111 !important;
        color: #FF8DA1 !important;
        border: 1.5px solid #FF8DA1 !important;
        border-radius: 6px !important;
        font-weight: 600 !important;
        transition: all 0.2s ease !important;
      }
      button[class*="Button"]:hover,
      div[class*="QuickAdd"] button:hover,
      button[class*="StyledDropdownButton"]:hover {
        background-color: #FF8DA1 !important;
        color: #111111 !important;
      }
      div[class*="CollectionTop"] {
        background: #ffffff !important;
        border-radius: 8px !important;
        padding: 20px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05) !important;
        border: 1px solid #EAEAEA !important;
      }
      div[class*="CollectionTop"] h1 {
        color: #111111 !important;
        font-weight: 700 !important;
        font-size: 1.5rem !important;
      }
      div[class*="Top"] div[class*="Container"] {
        background-color: #ffffff !important;
        border: 1px solid #EAEAEA !important;
        border-radius: 6px !important;
        color: #111111 !important;
      }
      #netlify-identity-widget {
        font-family: sans-serif;
      }
      .nc-netlifyIdentityWidget-button {
        background-color: #111111 !important;
        color: #FF8DA1 !important;
        border: 1px solid #FF8DA1 !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
